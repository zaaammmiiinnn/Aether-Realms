<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether-Realms — Alpha Sandbox</title>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
    }
    
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Start / Pause Screen */
    #start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      cursor: pointer;
      z-index: 1000;
      user-select: none;
    }
    #start-screen h1 {
      font-size: 3.5rem;
      text-transform: uppercase;
      letter-spacing: 8px;
      margin-bottom: 20px;
      color: #0ff;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }
    #start-screen p {
      font-size: 1.2rem;
      color: #aaa;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    /* Minimalist HUD */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 10;
      opacity: 0.6;
    }

    #hud-info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.8);
      pointer-events: none;
      z-index: 100;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 4px;
    }

    #toast-container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .toast {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      margin-top: 8px;
      animation: fadeUp 0.3s ease-out forwards;
    }
    .toast.success { color: #0fa; box-shadow: 0 0 10px rgba(0,255,170,0.3); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  
  <div id="start-screen">
    <h1>Aether Realms</h1>
    <p>CLICK TO AWAKEN</p>
  </div>
  
  <div id="crosshair">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="1.5" fill="none">
      <circle cx="12" cy="12" r="1.5"></circle>
      <line x1="12" y1="2" x2="12" y2="8"></line>
      <line x1="12" y1="16" x2="12" y2="22"></line>
      <line x1="2" y1="12" x2="8" y2="12"></line>
      <line x1="16" y1="12" x2="22" y2="12"></line>
    </svg>
  </div>

  <div id="hud-info">
    <div id="fps-counter">FPS: --</div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
